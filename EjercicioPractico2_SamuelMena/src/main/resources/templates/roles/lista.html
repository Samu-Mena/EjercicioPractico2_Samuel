<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:replace="layout/layout :: layout(~{::contenido})">

    <div th:fragment="contenido">

        <div class="shadow p-4 bg-white rounded">
            <h2 class="mb-3">Gestión de Roles</h2>

            <a href="/roles/nuevo" class="btn btn-success mb-3">+ Nuevo Rol</a>

            <table class="table table-striped table-hover shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th style="width: 180px;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${roles}">
                        <td th:text="${r.nombre}"></td>
                        <td>
                            <a th:href="@{'/roles/editar/' + ${r.id}}" class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{'/roles/eliminar/' + ${r.id}}"
                               onclick="return confirm('¿Eliminar este rol?')"
                               class="btn btn-danger btn-sm">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>

</body>
</html>
