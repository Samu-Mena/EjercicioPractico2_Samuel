<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Consultas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 class="mb-4">Consultas de Eventos</h2>

<!-- Buscar por estado -->
<form th:action="@{/consultas/estado}" method="post" class="mb-3">
    <select name="activo" class="form-control">
        <option value="true">Activos</option>
        <option value="false">Inactivos</option>
    </select>
    <button class="btn btn-primary mt-2">Buscar</button>
</form>

<!-- Buscar por fechas -->
<form th:action="@{/consultas/fechas}" method="post" class="mb-3">
    <input type="date" name="inicio" class="form-control mb-2">
    <input type="date" name="fin" class="form-control mb-2">
    <button class="btn btn-success">Buscar por fechas</button>
</form>

<!-- Buscar por nombre -->
<form th:action="@{/consultas/nombre}" method="post" class="mb-3">
    <input type="text" name="nombre" class="form-control" placeholder="Nombre del evento">
    <button class="btn btn-warning mt-2">Buscar</button>
</form>

<!-- Contar activos -->
<form th:action="@{/consultas/activos}" method="post" class="mb-3">
    <button class="btn btn-dark">Contar eventos activos</button>
</form>

<hr>

<!-- Resultados -->
<div th:if="${resultados != null}">
    <h4>Resultados:</h4>
    <ul class="list-group">
        <li class="list-group-item" th:each="e : ${resultados}">
            <span th:text="${e.nombre}"></span> -
            <span th:text="${e.fecha}"></span>
        </li>
    </ul>
</div>

<div th:if="${total != null}">
    <h4>Total activos: <span th:text="${total}"></span></h4>
</div>

</body>
</html>
