<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<div th:replace="layout/layout :: layout(~{::contenido})">

    <div th:fragment="contenido">

        <div class="shadow p-4 bg-white rounded">
            <h2 class="mb-3">Gestión de Usuarios</h2>

            <a href="/usuarios/nuevo"
               class="btn btn-success mb-3"
               sec:authorize="hasAuthority('ADMIN')">
                + Nuevo Usuario
            </a>

            <table class="table table-striped table-hover shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th sec:authorize="hasAuthority('ADMIN')" style="width: 200px;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.nombre}"></td>
                        <td th:text="${u.email}"></td>
                        <td th:text="${u.rol.nombre}"></td>

                        <td>
                            <span th:if="${u.activo}" class="badge bg-success">Activo</span>
                            <span th:unless="${u.activo}" class="badge bg-danger">Inactivo</span>
                        </td>

                        <td sec:authorize="hasAuthority('ADMIN')">
                            <a th:href="@{'/usuarios/editar/' + ${u.id}}" class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{'/usuarios/eliminar/' + ${u.id}}"
                               onclick="return confirm('¿Eliminar usuario?')"
                               class="btn btn-danger btn-sm">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>

</body>
</html>
