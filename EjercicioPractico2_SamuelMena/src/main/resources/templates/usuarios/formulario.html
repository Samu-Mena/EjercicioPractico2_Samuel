<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/layout :: contenido">

<div class="col-md-6">
    <h2>Formulario Usuario</h2>

    <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" th:field="*{id}">

        <div class="mb-2">
            <label>Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control" required>
        </div>

        <div class="mb-2">
            <label>Email</label>
            <input type="email" th:field="*{email}" class="form-control" required>
        </div>

        <div class="mb-2">
            <label>Password</label>
            <input type="password" th:field="*{password}" class="form-control" required>
        </div>

        <div class="mb-2">
            <label>Rol</label>
            <select th:field="*{rol}" class="form-control">
                <option th:each="r : ${roles}"
                        th:value="${r}"
                        th:text="${r.nombre}">
                </option>
            </select>
        </div>

        <div class="form-check mb-3">
            <input type="checkbox" th:field="*{activo}" class="form-check-input">
            <label class="form-check-label">Activo</label>
        </div>

        <button class="btn btn-primary">Guardar</button>
        <a href="/usuarios" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</html>
